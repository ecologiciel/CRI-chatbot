# =============================================================================
# CRI Chatbot Platform — CD Pipeline (DEPRECATED)
#
# DEPRECATED: This workflow is replaced by:
#   - ci.yml (Docker build + security scan)
#   - deploy-production.yml (multi-VPS deployment with rollback)
#
# Kept as manual emergency fallback only.
# =============================================================================

name: Deploy (Legacy)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Test — Reuse CI workflow as safety net
  # ---------------------------------------------------------------------------
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Build & Push — Docker images to GitHub Container Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REPO_LC: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO_LC=${REPO_LC,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/docker/frontend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.${{ vars.DOMAIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — SSH to Nindohost and run deploy script (single VPS)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          timeout: 120s
          script: |
            cd /opt/cri-platform
            echo "--- Syncing repository ---"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            echo "--- Running deploy script ---"
            ./scripts/deploy.sh ${{ github.sha }}

      - name: Notify deployment status
        if: failure()
        run: |
          echo "::error::Deployment to production FAILED for commit ${{ github.sha }}"
          echo "Check the Nindohost server logs for details."
