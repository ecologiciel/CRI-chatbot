# =============================================================================
# CRI Chatbot Platform — CI Pipeline
# Lint + Test on every push to develop and PR to develop/main
# =============================================================================

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
  # Allow deploy.yml to call this workflow
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — Python (ruff, mypy) + TypeScript (next lint)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Mypy type check
        run: mypy backend/app/ --ignore-missing-imports

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Next.js lint
        run: npm run lint
        working-directory: frontend

  # ---------------------------------------------------------------------------
  # Test Backend — pytest with PostgreSQL + Redis service containers
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cri_platform
          POSTGRES_USER: cri_admin
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cri_admin -d cri_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cri_platform
          POSTGRES_USER: cri_admin
          POSTGRES_PASSWORD: test-password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          MINIO_ROOT_PASSWORD: test-password
          JWT_SECRET_KEY: test-jwt-secret-ci-only
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing
        working-directory: backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Test Frontend — TypeScript build check (parallel with test-backend)
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (TypeScript type check)
        run: npm run build
        working-directory: frontend
