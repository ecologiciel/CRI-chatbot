# =============================================================================
# CRI Chatbot Platform — VPS Pre-Prod (Staging)
# Miroir production complet, specs reduites
# Specs : 4 vCPU, 16 Go RAM, 200 Go SSD NVMe
# Usage : docker compose -f docker-compose.staging.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # Budget memoire : 3 Go
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16-alpine
    container_name: cri-stg-postgresql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=ddl"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cri_platform}
      POSTGRES_USER: ${POSTGRES_USER:-cri_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cri_admin} -d ${POSTGRES_DB:-cri_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 3g
    memswap_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Redis 7
  # Budget memoire : 1 Go
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cri-stg-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Qdrant
  # Budget memoire : 3 Go
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: cri-stg-qdrant
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 3g
    memswap_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # MinIO
  # Budget memoire : 1 Go
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cri-stg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cri_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Backend API — 1 seule instance
  # Budget memoire : 2 Go
  # ---------------------------------------------------------------------------
  backend:
    image: ${DOCKER_REGISTRY:-ghcr.io/ecologiciel/cri-chatbot}/backend:${IMAGE_TAG:-latest}
    container_name: cri-stg-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env
    environment:
      - POSTGRES_HOST=postgresql
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - MINIO_ENDPOINT=minio:9000
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cri-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.middlewares=security-headers@file,rate-limit-global@file"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend-http.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https@file"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # ARQ Worker — 1 seul conteneur, tous les workers
  # Budget memoire : 2 Go
  # ---------------------------------------------------------------------------
  arq-worker:
    image: ${DOCKER_REGISTRY:-ghcr.io/ecologiciel/cri-chatbot}/backend:${IMAGE_TAG:-latest}
    container_name: cri-stg-arq-worker
    command: >
      bash -c "
        arq app.workers.ingestion.WorkerSettings &
        arq app.workers.notification.WorkerSettings &
        arq app.workers.campaign.WorkerSettings &
        arq app.workers.learning.WorkerSettings &
        arq app.workers.import_dossier.WorkerSettings &
        arq app.workers.archive.WorkerSettings &
        arq app.workers.purge.WorkerSettings &
        wait -n; EXIT=$$?; kill 0; exit $$EXIT
      "
    env_file: .env
    environment:
      - POSTGRES_HOST=postgresql
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - MINIO_ENDPOINT=minio:9000
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "pgrep -c -f 'arq app.workers' | grep -qE '^[5-7]$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Frontend Next.js — Back-Office
  # Budget memoire : 512 Mo
  # ---------------------------------------------------------------------------
  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io/ecologiciel/cri-chatbot}/frontend:${IMAGE_TAG:-latest}
    container_name: cri-stg-frontend
    environment:
      - NODE_ENV=production
    networks:
      - cri-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend-http.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https@file"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Traefik v3 — Reverse proxy + TLS staging Let's Encrypt
  # Budget memoire : 256 Mo
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: cri-stg-traefik
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=false"
      - "--ping=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=cri-staging"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/letsencrypt
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Prometheus
  # Budget memoire : 512 Mo
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: cri-stg-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      alertmanager:
        condition: service_healthy
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Grafana
  # Budget memoire : 512 Mo
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: cri-stg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # AlertManager
  # Budget memoire : 128 Mo
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cri-stg-alertmanager
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - cri-staging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

# =============================================================================
# Reseau unique staging
# =============================================================================
networks:
  cri-staging:
    driver: bridge
    name: cri-staging

# =============================================================================
# Volumes nommes
# =============================================================================
volumes:
  postgresql_data:
  redis_data:
  qdrant_data:
  minio_data:
  traefik_certs:
  prometheus_data:
  grafana_data:
