global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (Phase 3 security alerts)
rule_files:
  - "alert_rules.yml"

# AlertManager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
    metrics_path: /metrics

  - job_name: "fastapi"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
