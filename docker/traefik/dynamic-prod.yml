# =============================================================================
# CRI Chatbot Platform — Traefik v3 Dynamic Configuration (Production Multi-VPS)
# File provider only — no Docker socket (backends on VPS 1, Traefik on VPS 3)
# Environment variables interpolated via Traefik Go templates:
#   VPS1_PRIVATE_IP, DOMAIN
# =============================================================================

http:
  # ---------------------------------------------------------------------------
  # Middlewares (same as dev dynamic.yml)
  # ---------------------------------------------------------------------------
  middlewares:
    # --- Headers de securite (CLAUDE.md section 9.6) ---
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:"
          Permissions-Policy: "camera=(), microphone=(), geolocation=()"

    # --- CORS Back-Office (production domain) ---
    cors-backoffice:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
          - X-Tenant-ID
        accessControlAllowOriginList:
          - "https://admin.{{ env "DOMAIN" }}"
        accessControlMaxAge: 86400
        addVaryHeader: true

    # --- Rate limiting global (100 req/min, burst 50) ---
    rate-limit-global:
      rateLimit:
        average: 100
        burst: 50
        period: "1m"

    # --- HTTP to HTTPS redirect ---
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  # ---------------------------------------------------------------------------
  # Services — explicit backends (no Docker provider discovery)
  # ---------------------------------------------------------------------------
  services:
    # Backend API : load-balanced across 2 instances on VPS 1
    backend-api:
      loadBalancer:
        servers:
          - url: "http://{{ env "VPS1_PRIVATE_IP" }}:8001"
          - url: "http://{{ env "VPS1_PRIVATE_IP" }}:8002"
        healthCheck:
          path: /api/v1/health
          interval: "10s"
          timeout: "3s"

    # Frontend Next.js : local on VPS 3 (same Docker network)
    frontend-app:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

  # ---------------------------------------------------------------------------
  # Routers
  # ---------------------------------------------------------------------------
  routers:
    # --- Backend API (HTTPS) ---
    backend-https:
      rule: "Host(`api.{{ env "DOMAIN" }}`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
        - cors-backoffice
        - rate-limit-global
      service: backend-api

    # --- Backend API (HTTP -> redirect) ---
    backend-http:
      rule: "Host(`api.{{ env "DOMAIN" }}`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: backend-api

    # --- Frontend Back-Office (HTTPS) ---
    frontend-https:
      rule: "Host(`admin.{{ env "DOMAIN" }}`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
      service: frontend-app

    # --- Frontend Back-Office (HTTP -> redirect) ---
    frontend-http:
      rule: "Host(`admin.{{ env "DOMAIN" }}`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: frontend-app
