# =============================================================================
# CRI Chatbot Platform — VPS Prod 2 : Data Layer
# PostgreSQL 16 + Redis 7 + MinIO
# Specs : 4 vCPU, 16 Go RAM, 200 Go SSD NVMe
# Usage : docker compose -f docker-compose.prod-data.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Base relationnelle (schema par tenant + RLS)
  # Budget memoire : 6 Go
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16-alpine
    container_name: cri-postgresql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_statement=ddl"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cri_platform}
      POSTGRES_USER: ${POSTGRES_USER:-cri_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${VPS2_PRIVATE_IP}:5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - cri-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cri_admin} -d ${POSTGRES_DB:-cri_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 6g
    memswap_limit: 6g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache, sessions, rate limiting, ARQ queues
  # Budget memoire : 2 Go
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cri-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 1536mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    ports:
      - "${VPS2_PRIVATE_IP}:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cri-data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # MinIO — Stockage objet S3-compatible (bucket par tenant)
  # Budget memoire : 3 Go — Console desactivee en production
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cri-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cri_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "${VPS2_PRIVATE_IP}:9000:9000"
    volumes:
      - minio_data:/data
    networks:
      - cri-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 3g
    memswap_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

# =============================================================================
# Reseau — Interne VPS 2 uniquement
# =============================================================================
networks:
  cri-data:
    driver: bridge
    name: cri-data

# =============================================================================
# Volumes nommes — Persistance des donnees
# =============================================================================
volumes:
  postgresql_data:
  redis_data:
  minio_data:
